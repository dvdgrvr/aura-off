<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Aura Off — hold your aura, survive the pressure, release for glory." />
  <meta name="theme-color" content="#0d0d1a" />
  <title>Aura Off</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #0d0d1a;
      overflow: hidden;
    }

    body {
      font-family: Arial, sans-serif;
    }

    #game-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #game-container canvas {
      display: block;
    }
  </style>
</head>

<body>
  <div id="game-container"></div>
  
  <div id="mobile-controls" style="display: none;">
    <div id="joystick-container">
      <div id="mobile-joystick">
        <div id="mobile-joystick-nub"></div>
      </div>
    </div>
    <div id="action-buttons">
      <div id="mobile-btn-skill" class="mobile-btn">
        <span>Q</span>
        <label>Disrupt</label>
      </div>
      <div id="mobile-btn-charge" class="mobile-btn">
        <span>A</span>
        <label>Charge</label>
      </div>
    </div>
  </div>

  <style>
    /* Prevent text selection and default touch actions like pinch-zoom and pull-to-refresh */
    body {
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    /* Mobile Controls Container */
    #mobile-controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 45vh; /* Take up roughly bottom half of screen on portrait */
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 5%;
      z-index: 1000;
      pointer-events: none; /* Let clicks pass through empty areas */
    }

    #joystick-container {
      pointer-events: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 140px;
      height: 140px;
      margin-bottom: 20px;
    }

    #mobile-joystick {
      width: 120px;
      height: 120px;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
    }

    #mobile-joystick-nub {
      width: 50px;
      height: 50px;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      position: absolute;
      pointer-events: none;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
    }

    #action-buttons {
      pointer-events: auto;
      display: flex;
      gap: 15px;
      align-items: flex-end;
      margin-bottom: 20px;
    }

    .mobile-btn {
      width: 70px;
      height: 70px;
      background: rgba(255, 255, 255, 0.15);
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.8);
      font-family: sans-serif;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }
    
    .mobile-btn.active {
      background: rgba(255, 255, 255, 0.4);
      transform: scale(0.95);
    }

    #mobile-btn-charge {
      width: 85px;
      height: 85px;
      border-color: rgba(100, 200, 255, 0.4);
    }

    .mobile-btn span {
      font-size: 22px;
      font-weight: bold;
    }
    .mobile-btn label {
      font-size: 10px;
      margin-top: 2px;
    }

    /* Shift the game canvas to top on portrait orientation so controls have room */
    @media (orientation: portrait) {
      #game-container {
        align-items: flex-start;
      }
      #game-container canvas {
        margin-top: env(safe-area-inset-top, 5vh);
      }
    }
  </style>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
